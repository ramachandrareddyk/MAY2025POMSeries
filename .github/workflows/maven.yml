name: Selenium Regression - QA Nightly
 
on:
  # ── Scheduled: Every Thursday at 6:00 PM UTC (11:30 PM IST) ──
  schedule:
    - cron: '0 18 * * 4'
 
  # ── Manual trigger from GitHub Actions UI ──
  workflow_dispatch:
    inputs:
      suite:
        description: 'TestNG suite XML to run'
        required: false
        default: 'regression.xml'
      environment:
        description: 'Target environment'
        required: false
        default: 'QA'
        type: choice
        options:
          - QA
          - UAT
          - Production
 
env:
  # ── Java 8 strictly required ──
  # ── Lombok 1.18.12 in pom.xml is NOT compatible with Java 9+ ──
  # ── Error on Java 17+: LombokProcessor cannot access JavacProcessingEnvironment ──
  JAVA_VERSION: '8'
  MAVEN_OPTS: '-Xmx2048m'
  DEFAULT_SUITE: 'regression.xml'
  DEFAULT_ENV: 'QA'
 
jobs:
  selenium-regression:
    name: Selenium TestNG - ${{ github.event.inputs.environment || 'QA' }} Regression
    # ── GitHub-hosted runner (Windows Server) ──
    # ── No self-hosted VM required for this repo ──
    runs-on: windows-latest
    timeout-minutes: 180
 
    steps:
      # ── 1. Checkout master branch ───────────────────────────────────────────────
      - name: Checkout master branch
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
 
      # ── 2. Set up Java 8 ──────────────────────────────────────────────────────
      # IMPORTANT: Must be Java 8 (Temurin).
      # Lombok 1.18.12 breaks on Java 9+ with:
      # "LombokProcessor cannot access JavacProcessingEnvironment"
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven
 
      # ── 3. Verify Java 8 is active ────────────────────────────────────────────
      - name: Verify Java version
        run: java -version
        shell: pwsh
 
      # ── 4. Cache Maven dependencies ───────────────────────────────────────────
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
 
      # ── 5. Clean previous Regression Reports ──────────────────────────────────
      - name: Clean previous Regression Reports
        run: |
          if (Test-Path "reports") { Remove-Item -Recurse -Force "reports" }
          New-Item -ItemType Directory -Force -Path "reports"
          Write-Host "Reports folder cleaned and ready"
        shell: pwsh
 
      # ── 6. Validate Maven project ─────────────────────────────────────────────
      - name: Validate Maven project
        run: mvn validate --no-transfer-progress
        shell: pwsh
 
      # ── 7. Run Selenium TestNG regression suite ───────────────────────────────
      # Suite passed via -DBatchFile as defined in pom.xml surefire config
      # WebDriverManager (v5.4.1) handles ChromeDriver automatically - no manual install needed
      # testFailureIgnore=true in pom.xml — build won't fail even if tests fail
      - name: Run Selenium Tests
        env:
          APP_BASE_URL:      ${{ secrets.APP_BASE_URL }}
          APP_USERNAME:      ${{ secrets.APP_USERNAME }}
          APP_PASSWORD:      ${{ secrets.APP_PASSWORD }}
          DB_CONNECTION_URL: ${{ secrets.DB_CONNECTION_URL }}
        run: |
          mvn test `
            --no-transfer-progress `
            -DBatchFile=${{ github.event.inputs.suite || env.DEFAULT_SUITE }}
        shell: pwsh
 
      # ── 8. Collect Regression Report into /reports folder ─────────────────────
      # Extent Reports (com.aventstack 3.1.5) writes to test-output/ by default
      - name: Collect Regression Reports
        if: always()
        run: |
          $reportSources = @(
            "test-output\ExtentReport.html",
            "test-output\extent-report.html",
            "ExtentReports\ExtentReport.html",
            "target\extent-reports\ExtentReport.html"
          )
          foreach ($src in $reportSources) {
            if (Test-Path $src) {
              Copy-Item $src -Destination "reports\RegressionReport.html" -Force
              Write-Host "Regression Report collected from: $src"
              break
            }
          }
          if (Test-Path "target\surefire-reports") {
            Copy-Item -Recurse "target\surefire-reports\*" -Destination "reports\" -Force
          }
          if (Test-Path "test-output") {
            Copy-Item -Recurse "test-output\*" -Destination "reports\" -Force
          }
          if (Test-Path "target\screenshots") {
            Copy-Item -Recurse "target\screenshots" -Destination "reports\screenshots" -Force
          }
          Write-Host ""
          Write-Host "── Regression Report folder contents ──"
          Get-ChildItem -Recurse "reports" | Select-Object FullName
        shell: pwsh
 
      # ── 9. Upload Regression Reports as artifact ──────────────────────────────
      - name: Upload Regression Report Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: RegressionReport-${{ github.event.inputs.environment || 'QA' }}-Run${{ github.run_number }}
          path: reports/
          retention-days: 30
