name: Nightly Regression Tests

on:
  schedule:
    # Runs every night at midnight UTC (5:30 AM IST)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions UI

jobs:
  regression-tests:
    name: Run Selenium TestNG Regression Suite
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Java 17 (matches your maven.compiler.release)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Step 3: Install Google Chrome (needed for Selenium)
      - name: Install Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      # Step 4: Fix TestNG XML path — GitHub Actions runs on Linux, so fix Windows backslashes
      - name: Fix TestNG Suite Path in pom.xml
        run: |
          sed -i 's|Resources\\TestRunners\\Regression.xml|Resources/TestRunners/Regression.xml|g' pom.xml

      # Step 5: Run Maven tests
      - name: Run Regression Test Suite
        run: mvn clean test -B
        env:
          # Add any environment variables your tests need, e.g.:
          # BASE_URL: ${{ secrets.BASE_URL }}
          # USERNAME: ${{ secrets.APP_USERNAME }}
          # PASSWORD: ${{ secrets.APP_PASSWORD }}
          JAVA_OPTS: "-Dheadless=true"

      # Step 6: Upload ExtentReports HTML report as artifact
      - name: Upload Test Report
        if: always()  # Upload even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: extent-report-${{ github.run_number }}
          path: |
            target/
            Reports/
            test-output/
          retention-days: 7

      # Step 7: Upload Surefire XML reports
      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ github.run_number }}
          path: target/surefire-reports/
          retention-days: 7

      # Step 8: Notify on failure (optional — requires a Slack webhook secret)
      # - name: Notify Slack on Failure
      #   if: failure()
      #   uses: slackapi/slack-github-action@v1.26.0
      #   with:
      #     payload: '{"text":"❌ Nightly regression tests FAILED! Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
      #   env:
      #     SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
